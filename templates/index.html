<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <base href="{{ base_path }}">
  <title>Audio Transcription</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 2rem 1rem;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.1);
      padding: 2rem;
      width: 100%;
      max-width: 540px;
    }
    h1 { font-size: 1.5rem; margin-bottom: 1.5rem; color: #222; }
    #drop-zone {
      border: 2px dashed #aaa;
      border-radius: 8px;
      padding: 2.5rem 1rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      color: #666;
    }
    #drop-zone.drag-over {
      border-color: #2563eb;
      background: #eff6ff;
    }
    #drop-zone svg { display: block; margin: 0 auto 0.75rem; }
    #file-info {
      margin-top: 0.75rem;
      font-size: 0.875rem;
      color: #555;
      min-height: 1.25rem;
    }
    #file-input { display: none; }
    .model-toggle {
      display: flex;
      margin-top: 1.25rem;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      overflow: hidden;
    }
    .model-toggle input[type="radio"] { display: none; }
    .model-toggle label {
      flex: 1;
      padding: 0.55rem 0;
      text-align: center;
      font-size: 0.9rem;
      cursor: pointer;
      color: #374151;
      background: #f9fafb;
      transition: background 0.15s, color 0.15s;
      user-select: none;
    }
    .model-toggle label:first-of-type { border-right: 1px solid #d1d5db; }
    .model-toggle input[type="radio"]:checked + label {
      background: #2563eb;
      color: #fff;
      font-weight: 600;
    }
    .model-toggle label small {
      display: block;
      font-size: 0.72rem;
      opacity: 0.75;
      font-weight: normal;
    }
    .btn-row {
      margin-top: 1.25rem;
      display: flex;
      gap: 0.6rem;
    }
    #transcribe-btn {
      flex: 1;
      padding: 0.75rem;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    #transcribe-btn:disabled {
      background: #93c5fd;
      cursor: not-allowed;
    }
    #transcribe-btn:not(:disabled):hover { background: #1d4ed8; }
    #stop-btn {
      padding: 0.75rem 1.1rem;
      background: #fff;
      color: #dc2626;
      border: 1px solid #fca5a5;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      display: none;
      transition: background 0.2s;
    }
    #stop-btn:hover { background: #fef2f2; }
    #lang-badge {
      display: inline-block;
      margin-left: 0.5rem;
      padding: 0.1rem 0.5rem;
      background: #eff6ff;
      color: #1d4ed8;
      border-radius: 4px;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      vertical-align: middle;
    }
    #status-box {
      margin-top: 1.5rem;
      display: none;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 1rem 1.25rem;
    }
    #status-box .label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: #6b7280; margin-bottom: 0.4rem; }
    #status-text { font-size: 0.95rem; color: #111; display: flex; align-items: center; gap: 0.5rem; }
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid #d1d5db;
      border-top-color: #2563eb;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #downloads { margin-top: 1rem; display: none; gap: 0.75rem; }
    #downloads a {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.5rem 1rem;
      border-radius: 6px;
      font-size: 0.9rem;
      text-decoration: none;
      font-weight: 500;
    }
    .btn-txt  { background: #ecfdf5; color: #065f46; border: 1px solid #6ee7b7; }
    .btn-docx { background: #eff6ff; color: #1e3a8a; border: 1px solid #93c5fd; }
    .btn-txt:hover  { background: #d1fae5; }
    .btn-docx:hover { background: #dbeafe; }
    #error-msg { margin-top: 0.75rem; color: #dc2626; font-size: 0.9rem; display: none; }
    #stats-box {
      margin-top: 0.75rem;
      display: none;
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      border-radius: 8px;
      padding: 0.75rem 1rem;
    }
    #stats-box .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 0.5rem 0.75rem;
    }
    #stats-box .stat {
      display: flex;
      flex-direction: column;
    }
    #stats-box .stat-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #6b7280;
    }
    #stats-box .stat-value {
      font-size: 0.92rem;
      font-weight: 600;
      color: #065f46;
    }
    #stats-box .stat-sub {
      font-size: 0.75rem;
      color: #4b5563;
      font-weight: normal;
    }
    #lang-override {
      margin-top: 0.75rem;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      display: none;
    }
    .lang-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 0.4rem;
    }
    #lang-select {
      flex: 1;
      padding: 0.4rem 0.5rem;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 0.875rem;
      background: #fff;
      cursor: pointer;
      color: #374151;
    }
    #retranscribe-btn {
      padding: 0.4rem 0.9rem;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s;
    }
    #retranscribe-btn:hover { background: #1d4ed8; }
    #retranscribe-btn:disabled { background: #93c5fd; cursor: not-allowed; }
    .start-lang-row {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-top: 1.25rem;
    }
    .start-lang-row label {
      font-size: 0.875rem;
      font-weight: 500;
      color: #374151;
      white-space: nowrap;
    }
    #start-lang-select {
      flex: 1;
      padding: 0.55rem 0.5rem;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 0.875rem;
      background: #f9fafb;
      cursor: pointer;
      color: #374151;
    }
    #recent-section { margin-top: 2rem; display: none; }
    #recent-section h2 {
      font-size: 0.95rem;
      font-weight: 600;
      color: #374151;
      margin-bottom: 0.75rem;
      padding-top: 1.5rem;
      border-top: 1px solid #eceef1;
    }
    #recent-list { list-style: none; display: flex; flex-direction: column; gap: 0.6rem; }
    .recent-item {
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 0.7rem 0.85rem;
      background: #fafafa;
    }
    .recent-name {
      font: inherit;
      font-weight: 600;
      font-size: 0.9rem;
      color: #1d4ed8;
      background: none;
      border: none;
      padding: 0;
      cursor: pointer;
      display: block;
      width: 100%;
      text-align: left;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .recent-name:hover { text-decoration: underline; }
    .recent-meta {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 0.35rem;
      font-size: 0.75rem;
      color: #6b7280;
    }
    .recent-badge {
      display: inline-block;
      padding: 0.1rem 0.45rem;
      border-radius: 4px;
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.03em;
      background: #eef2ff;
      color: #4338ca;
    }
    .recent-actions {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 0.6rem;
      flex-wrap: wrap;
    }
    .recent-actions a {
      font-size: 0.78rem;
      text-decoration: none;
      padding: 0.3rem 0.7rem;
      border-radius: 5px;
      font-weight: 500;
    }
    .recent-actions select {
      font: inherit;
      font-size: 0.78rem;
      padding: 0.3rem 0.35rem;
      border: 1px solid #d1d5db;
      border-radius: 5px;
      background: #fff;
      color: #374151;
      cursor: pointer;
    }
    .recent-actions .spacer { flex: 1; }
    .recent-retr {
      font: inherit;
      font-size: 0.78rem;
      font-weight: 500;
      padding: 0.3rem 0.7rem;
      border: 1px solid #c7d2fe;
      border-radius: 5px;
      background: #fff;
      color: #4338ca;
      cursor: pointer;
      white-space: nowrap;
    }
    .recent-retr:hover { background: #eef2ff; }
    .recent-retr:disabled { opacity: 0.5; cursor: not-allowed; }
  </style>
</head>
<body>
<div class="card">
  <h1>Audio Transcription</h1>

  <div id="drop-zone" role="button" tabindex="0" aria-label="Drop audio file here or click to select">
    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
      <polyline points="17 8 12 3 7 8"/>
      <line x1="12" y1="3" x2="12" y2="15"/>
    </svg>
    <p>Drag &amp; drop an audio file here</p>
    <p style="font-size:0.8rem;margin-top:0.4rem;">or click to select &mdash; mp3, m4a, mp4, wav, flac, ogg&hellip;</p>
  </div>
  <input id="file-input" type="file" accept=".mp3,.m4a,.mp4,.wav,.ogg,.flac,.webm,.aac">
  <div id="file-info"></div>

  <div class="model-toggle">
    <input type="radio" name="model" id="model-precise" value="precise" checked>
    <label for="model-precise">Precise <small>large-v3, slower</small></label>
    <input type="radio" name="model" id="model-fast" value="fast">
    <label for="model-fast">Fast <small>base, quicker</small></label>
  </div>

  <div class="start-lang-row">
    <label for="start-lang-select">Language</label>
    <select id="start-lang-select">
      <option value="">Auto-detect</option>
    </select>
  </div>

  <div class="btn-row">
    <button id="transcribe-btn" disabled>Transcribe</button>
    <button id="stop-btn" title="Stop transcription">&#9632; Stop</button>
  </div>

  <div id="status-box">
    <div class="label">Status</div>
    <div id="status-text"></div>
  </div>
  <div id="lang-override">
    <div class="label" id="lang-override-label">Detected language</div>
    <div class="lang-row">
      <select id="lang-select"></select>
      <button id="retranscribe-btn">&#8635; Retranscribe</button>
    </div>
  </div>
  <div id="error-msg"></div>
  <div id="stats-box">
    <div class="stats-grid">
      <div class="stat">
        <span class="stat-label">Audio</span>
        <span class="stat-value" id="stat-audio">—</span>
      </div>
      <div class="stat">
        <span class="stat-label">Transcription</span>
        <span class="stat-value" id="stat-transcription">—</span>
        <span class="stat-sub" id="stat-speedup"></span>
      </div>
      <div class="stat">
        <span class="stat-label">Diarization</span>
        <span class="stat-value" id="stat-diarization">—</span>
      </div>
    </div>
  </div>
  <div id="downloads">
    <a id="dl-txt"  class="btn-txt"  href="#" download>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      Download TXT
    </a>
    <a id="dl-docx" class="btn-docx" href="#" download>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      Download DOCX
    </a>
  </div>

  <div id="recent-section">
    <h2>Recent transcriptions</h2>
    <ul id="recent-list"></ul>
  </div>
</div>

<script>
  const dropZone        = document.getElementById('drop-zone');
  const fileInput       = document.getElementById('file-input');
  const fileInfo        = document.getElementById('file-info');
  const btn             = document.getElementById('transcribe-btn');
  const stopBtn         = document.getElementById('stop-btn');
  const statusBox       = document.getElementById('status-box');
  const statusText      = document.getElementById('status-text');
  const downloads       = document.getElementById('downloads');
  const errorMsg        = document.getElementById('error-msg');
  const dlTxt           = document.getElementById('dl-txt');
  const dlDocx          = document.getElementById('dl-docx');
  const statsBox        = document.getElementById('stats-box');
  const langOverride    = document.getElementById('lang-override');
  const langSelect      = document.getElementById('lang-select');
  const retranscribeBtn = document.getElementById('retranscribe-btn');

  let selectedFile = null;
  let pollInterval = null;
  let currentJobId = null;

  const LANGUAGES = [
    ['af','Afrikaans'],['ar','Arabic'],['bg','Bulgarian'],['ca','Catalan'],
    ['cs','Czech'],['cy','Welsh'],['da','Danish'],['de','German'],
    ['el','Greek'],['en','English'],['es','Spanish'],['et','Estonian'],
    ['fa','Persian'],['fi','Finnish'],['fr','French'],['gl','Galician'],
    ['he','Hebrew'],['hi','Hindi'],['hr','Croatian'],['hu','Hungarian'],
    ['hy','Armenian'],['id','Indonesian'],['is','Icelandic'],['it','Italian'],
    ['ja','Japanese'],['ka','Georgian'],['kk','Kazakh'],['ko','Korean'],
    ['lt','Lithuanian'],['lv','Latvian'],['mk','Macedonian'],['ms','Malay'],
    ['nl','Dutch'],['no','Norwegian'],['pl','Polish'],['pt','Portuguese'],
    ['ro','Romanian'],['ru','Russian'],['sk','Slovak'],['sl','Slovenian'],
    ['sq','Albanian'],['sr','Serbian'],['sv','Swedish'],['sw','Swahili'],
    ['ta','Tamil'],['th','Thai'],['tr','Turkish'],['uk','Ukrainian'],
    ['ur','Urdu'],['vi','Vietnamese'],['zh','Chinese'],
  ];

  const startLangSelect = document.getElementById('start-lang-select');

  LANGUAGES.forEach(([code, name]) => {
    for (const sel of [langSelect, startLangSelect]) {
      const opt = document.createElement('option');
      opt.value = code;
      opt.textContent = name;
      sel.appendChild(opt);
    }
  });

  function formatBytes(n) {
    if (n < 1024) return n + ' B';
    if (n < 1048576) return (n/1024).toFixed(1) + ' KB';
    return (n/1048576).toFixed(1) + ' MB';
  }

  function fmtMin(seconds) {
    return (seconds / 60).toFixed(1) + ' min';
  }

  function setFile(file) {
    selectedFile = file;
    fileInfo.textContent = `${file.name} (${formatBytes(file.size)})`;
    btn.disabled = false;
    downloads.style.display    = 'none';
    statusBox.style.display    = 'none';
    statsBox.style.display     = 'none';
    errorMsg.style.display     = 'none';
    langOverride.style.display = 'none';
  }

  dropZone.addEventListener('click', () => fileInput.click());
  dropZone.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') fileInput.click(); });
  fileInput.addEventListener('change', () => { if (fileInput.files[0]) setFile(fileInput.files[0]); });

  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    if (e.dataTransfer.files[0]) setFile(e.dataTransfer.files[0]);
  });

  function langBadge(lang) {
    return lang ? `<span id="lang-badge">${lang.toUpperCase()}</span>` : '';
  }

  function showSpinner(msg, lang) {
    statusBox.style.display = 'block';
    statusText.innerHTML = `<span class="spinner"></span><span>${msg}${langBadge(lang)}</span>`;
  }

  function showDone(jobId, lang, stats) {
    statusBox.style.display = 'block';
    statusText.innerHTML = `<span style="color:#16a34a;font-weight:600;">Done!</span>${langBadge(lang)}`;
    dlTxt.href  = `download/${jobId}/txt`;
    dlDocx.href = `download/${jobId}/docx`;
    downloads.style.display = 'flex';
    if (stats) {
      document.getElementById('stat-audio').textContent = fmtMin(stats.audio_duration_s);
      document.getElementById('stat-transcription').textContent = fmtMin(stats.transcription_s);
      const speedup = stats.audio_duration_s / stats.transcription_s;
      document.getElementById('stat-speedup').textContent = speedup.toFixed(1) + 'x realtime';
      document.getElementById('stat-diarization').textContent = fmtMin(stats.diarization_s);
      statsBox.style.display = 'block';
    }
  }

  function maybeShowLangOverride(lang, isForced) {
    if (langOverride.style.display !== 'none') return;
    langSelect.value = lang || '';
    document.getElementById('lang-override-label').textContent =
      isForced ? 'Language (forced)' : 'Auto-detected language';
    langOverride.style.display = 'block';
  }

  function showError(msg) {
    statusBox.style.display = 'none';
    errorMsg.textContent = `Error: ${msg}`;
    errorMsg.style.display = 'block';
  }

  function stopRunning() {
    stopBtn.style.display = 'none';
    btn.disabled = false;
    retranscribeBtn.disabled = false;
    clearInterval(pollInterval);
    pollInterval = null;
  }

  function startPolling(jobId, isForced) {
    pollInterval = setInterval(async () => {
      try {
        const r = await fetch(`status/${jobId}`);
        const data = await r.json();
        if (data.language) maybeShowLangOverride(data.language, isForced);
        if (data.status === 'running') {
          showSpinner(data.progress || 'Processing...', data.language);
        } else if (data.status === 'done') {
          stopRunning();
          showDone(jobId, data.language, data.stats);
          loadRecent();
        } else if (data.status === 'cancelled') {
          stopRunning();
          statusBox.style.display = 'block';
          statusText.innerHTML = '<span style="color:#6b7280;">Cancelled.</span>';
        } else if (data.status === 'error') {
          stopRunning();
          showError(data.error || 'Unknown error');
        }
      } catch (err) {
        stopRunning();
        showError('Network error while polling status');
      }
    }, 3000);
  }

  stopBtn.addEventListener('click', async () => {
    if (!currentJobId) return;
    stopBtn.disabled = true;
    stopBtn.textContent = 'Stopping…';
    try {
      await fetch(`cancel/${currentJobId}`, { method: 'POST' });
    } catch (_) { /* ignore */ }
  });

  async function startTranscription(forcedLang) {
    if (!selectedFile) return;
    btn.disabled = true;
    retranscribeBtn.disabled = true;
    stopBtn.style.display = 'none';
    stopBtn.disabled = false;
    stopBtn.textContent = '⏹ Stop';
    downloads.style.display    = 'none';
    statsBox.style.display     = 'none';
    errorMsg.style.display     = 'none';
    langOverride.style.display = 'none';
    currentJobId = null;
    showSpinner('Uploading...');

    const model = document.querySelector('input[name="model"]:checked').value;
    const form = new FormData();
    form.append('audio', selectedFile);
    form.append('model', model);
    if (forcedLang) form.append('language', forcedLang);

    try {
      const r = await fetch('upload', { method: 'POST', body: form });
      let data;
      try {
        data = await r.json();
      } catch {
        const hint = r.status === 413 ? 'File too large for the server'
                   : `Unexpected server response (HTTP ${r.status})`;
        showError(hint);
        btn.disabled = false;
        retranscribeBtn.disabled = false;
        return;
      }
      if (!r.ok || data.error) {
        showError(data.error || 'Upload failed');
        btn.disabled = false;
        retranscribeBtn.disabled = false;
        return;
      }
      currentJobId = data.job_id;
      stopBtn.style.display = 'inline-block';
      retranscribeBtn.disabled = false;
      showSpinner('Queued — waiting for transcription...');
      startPolling(data.job_id, !!forcedLang);
    } catch (err) {
      showError('Upload failed: ' + err.message);
      btn.disabled = false;
      retranscribeBtn.disabled = false;
    }
  }

  btn.addEventListener('click', () => startTranscription(startLangSelect.value || null));

  retranscribeBtn.addEventListener('click', async () => {
    if (!selectedFile) return;
    const newLang = langSelect.value;
    if (currentJobId && pollInterval) {
      clearInterval(pollInterval);
      pollInterval = null;
      try { await fetch(`cancel/${currentJobId}`, { method: 'POST' }); } catch (_) {}
      currentJobId = null;
    }
    await startTranscription(newLang);
  });

  // ---- Recent transcriptions (disk-backed, server is source of truth) ----
  const recentSection = document.getElementById('recent-section');
  const recentList    = document.getElementById('recent-list');

  function timeAgo(epoch) {
    if (!epoch) return '';
    const s = Math.max(0, Date.now() / 1000 - epoch);
    if (s < 60)    return 'just now';
    if (s < 3600)  return Math.floor(s / 60) + ' min ago';
    if (s < 86400) return Math.floor(s / 3600) + ' h ago';
    return Math.floor(s / 86400) + ' d ago';
  }

  function modelLabel(m) { return m === 'fast' ? 'Fast' : 'Precise'; }

  function restoreJob(item) {
    if (pollInterval) { clearInterval(pollInterval); pollInterval = null; }
    currentJobId = item.job_id;
    errorMsg.style.display = 'none';
    showDone(item.job_id, item.language, item.stats);
    statusBox.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  async function retranscribeRecent(item, model, language, btnEl) {
    btnEl.disabled = true;
    if (pollInterval) { clearInterval(pollInterval); pollInterval = null; }
    errorMsg.style.display     = 'none';
    langOverride.style.display = 'none';
    downloads.style.display    = 'none';
    statsBox.style.display     = 'none';
    currentJobId = null;
    showSpinner('Queued — waiting for transcription...');
    statusBox.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    try {
      const r = await fetch(`retranscribe/${item.job_id}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ model, language: language || undefined }),
      });
      const data = await r.json();
      if (!r.ok || data.error) {
        showError(data.error || 'Retranscribe failed');
        return;
      }
      currentJobId = data.job_id;
      stopBtn.style.display = 'inline-block';
      stopBtn.disabled = false;
      stopBtn.textContent = '⏹ Stop';
      startPolling(data.job_id, false);
    } catch (err) {
      showError('Retranscribe failed: ' + err.message);
    } finally {
      btnEl.disabled = false;
    }
  }

  function renderRecent(items) {
    recentList.innerHTML = '';
    if (!items.length) { recentSection.style.display = 'none'; return; }
    recentSection.style.display = 'block';

    items.forEach(item => {
      const li = document.createElement('li');
      li.className = 'recent-item';

      // Filename (truncated via CSS; full name on hover), click to reopen.
      const fullName = item.filename || '(untitled)';
      const name = document.createElement('button');
      name.className = 'recent-name';
      name.textContent = fullName;
      name.title = fullName;
      name.addEventListener('click', () => restoreJob(item));
      li.appendChild(name);

      // Meta row: time · language · model
      const meta = document.createElement('div');
      meta.className = 'recent-meta';
      const when = document.createElement('span');
      when.textContent = timeAgo(item.created_at);
      meta.appendChild(when);
      if (item.language) {
        const lb = document.createElement('span');
        lb.className = 'recent-badge';
        lb.textContent = item.language.toUpperCase();
        meta.appendChild(lb);
      }
      const mb = document.createElement('span');
      mb.className = 'recent-badge';
      mb.textContent = modelLabel(item.model);
      meta.appendChild(mb);
      li.appendChild(meta);

      // Actions row: downloads, then re-run controls (model + language).
      const actions = document.createElement('div');
      actions.className = 'recent-actions';

      const txt = document.createElement('a');
      txt.className = 'btn-txt';
      txt.href = `download/${item.job_id}/txt`;
      txt.setAttribute('download', '');
      txt.textContent = 'TXT';
      actions.appendChild(txt);

      const docx = document.createElement('a');
      docx.className = 'btn-docx';
      docx.href = `download/${item.job_id}/docx`;
      docx.setAttribute('download', '');
      docx.textContent = 'DOCX';
      actions.appendChild(docx);

      const spacer = document.createElement('span');
      spacer.className = 'spacer';
      actions.appendChild(spacer);

      const modelSel = document.createElement('select');
      modelSel.title = 'Model for re-run';
      ['precise', 'fast'].forEach(v => {
        const o = document.createElement('option');
        o.value = v;
        o.textContent = modelLabel(v);
        if (v === (item.model || 'precise')) o.selected = true;
        modelSel.appendChild(o);
      });
      actions.appendChild(modelSel);

      const langSel = document.createElement('select');
      langSel.title = 'Language for re-run';
      const auto = document.createElement('option');
      auto.value = '';
      auto.textContent = 'Auto';
      langSel.appendChild(auto);
      LANGUAGES.forEach(([code, lname]) => {
        const o = document.createElement('option');
        o.value = code;
        o.textContent = lname;
        if (code === item.language) o.selected = true;
        langSel.appendChild(o);
      });
      actions.appendChild(langSel);

      const rbtn = document.createElement('button');
      rbtn.className = 'recent-retr';
      rbtn.innerHTML = '&#8635; Retranscribe';
      rbtn.addEventListener('click', () => retranscribeRecent(item, modelSel.value, langSel.value, rbtn));
      actions.appendChild(rbtn);

      li.appendChild(actions);
      recentList.appendChild(li);
    });
  }

  async function loadRecent() {
    try {
      const r = await fetch('recent');
      if (!r.ok) return;
      renderRecent(await r.json());
    } catch (_) { /* ignore */ }
  }

  loadRecent();
</script>
</body>
</html>
